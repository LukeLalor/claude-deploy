name: Deploy Claude Agent
description:
  Deploy a managed Claude agent from a YAML configuration file in version
  control
author: Anthropic

branding:
  icon: upload-cloud
  color: purple

inputs:
  agent_id:
    description: >-
      The ID of the Claude agent to update. Optional if the config file contains
      an id field.
    required: false
  config_file:
    description: >-
      Path to the YAML configuration file for the agent (relative to the
      repository root)
    required: true
  anthropic_api_key:
    description: Anthropic API key with permission to manage agents
    required: true
  allow_creation:
    description: >-
      If true, create a new agent when no agent ID is provided via the agent_id
      input or the config file's id field
    required: false
    default: 'false'

outputs:
  agent_id:
    description: The ID of the agent that was created or updated
  version:
    description: The version of the agent after the update

runs:
  using: node24
  main: dist/index.js
